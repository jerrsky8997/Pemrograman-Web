<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir pendaftaran Mahasiswa Baru</title>
</head>
<body>
    <h1>Pendaftaran Mahasiswa Baru</h1>
    <form action="">
        <label for="">Nama Lengkap : </label>
        <input type="text" placeholder="Nama Lengkap Anda">
        <br>

        <label for="">Email Aktif : </label>
        <input type="email" name="" id="" placeholder="Email AKtif">
        <br>

        <label for="">Password : </label>
        <input type="password" name="" id="">
        <br>

        <label for="">Jenis Kelamin : </label>
        <input type="radio" name="Kelamin" id="kel_1">
        <label for="">Laki Laki</label>
        <input type="radio" name="Kelamin" id="Kel_2">
        <label for="">Perempuan</label>
        <br>
        <label for="">Hobi : </label>
        <input type="checkbox" name="" id=""><label for="">Mancing</label>
        <input type="checkbox" name="" id=""><label for="">Galau</label>
        <br>

        <label for="">Tanggal Lahir : </label>
        <input type="date" name="" id="">
        <br>
        <label for="">Masukan File Anda : </label>
        <input type="file" name="" id="">
        <br>

        <label for="">Alamat lengkap : </label>
        <textarea name="" id=""></textarea>
        <br>
        

        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
